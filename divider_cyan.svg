<svg width="700" height="14" viewBox="0 0 700 14" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gc" x="-10%" y="-100%" width="120%" height="300%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <linearGradient id="pc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00F0FF" stop-opacity="1"/>
      <stop offset="1" stop-color="#00F0FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g fill="#00F0FF" filter="url(#gc)">
    <rect x="0"   y="6" width="40"  height="2" rx="1" opacity="0.25"/>
    <rect x="50"  y="6" width="150" height="2" rx="1" opacity="0.55"/>
    <rect x="210" y="6" width="30"  height="2" rx="1" opacity="0.3"/>
    <rect x="250" y="6" width="260" height="2" rx="1" opacity="0.55"/>
    <rect x="520" y="6" width="20"  height="2" rx="1" opacity="0.25"/>
    <rect x="550" y="6" width="150" height="2" rx="1" opacity="0.55"/>
  </g>
  <rect x="0" y="5" width="120" height="4" rx="2" fill="url(#pc)" filter="url(#gc)">
    <animateTransform attributeName="transform" type="translate" from="-130 0" to="700 0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
