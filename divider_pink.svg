<svg width="700" height="14" viewBox="0 0 700 14" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gp" x="-10%" y="-100%" width="120%" height="300%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <linearGradient id="pp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF2D78" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FF2D78" stop-opacity="1"/>
      <stop offset="1" stop-color="#FF2D78" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g fill="#FF2D78" filter="url(#gp)">
    <rect x="0"   y="6" width="80"  height="2" rx="1" opacity="0.55"/>
    <rect x="90"  y="6" width="200" height="2" rx="1" opacity="0.55"/>
    <rect x="300" y="6" width="40"  height="2" rx="1" opacity="0.35"/>
    <rect x="350" y="6" width="180" height="2" rx="1" opacity="0.55"/>
    <rect x="540" y="6" width="60"  height="2" rx="1" opacity="0.3"/>
    <rect x="610" y="6" width="90"  height="2" rx="1" opacity="0.55"/>
  </g>
  <rect x="0" y="5" width="120" height="4" rx="2" fill="url(#pp)" filter="url(#gp)">
    <animateTransform attributeName="transform" type="translate" from="-130 0" to="700 0" dur="3.6s" repeatCount="indefinite"/>
  </rect>
</svg>
