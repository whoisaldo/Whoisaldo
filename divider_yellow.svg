<svg width="700" height="14" viewBox="0 0 700 14" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gy" x="-10%" y="-100%" width="120%" height="300%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <linearGradient id="py" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFE600" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFE600" stop-opacity="1"/>
      <stop offset="1" stop-color="#FFE600" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g fill="#FFE600" filter="url(#gy)">
    <rect x="0"   y="6" width="200" height="2" rx="1" opacity="0.55"/>
    <rect x="210" y="6" width="20"  height="2" rx="1" opacity="0.35"/>
    <rect x="240" y="6" width="100" height="2" rx="1" opacity="0.5"/>
    <rect x="350" y="6" width="10"  height="2" rx="1" opacity="0.3"/>
    <rect x="370" y="6" width="220" height="2" rx="1" opacity="0.55"/>
    <rect x="600" y="6" width="100" height="2" rx="1" opacity="0.4"/>
  </g>
  <rect x="0" y="5" width="120" height="4" rx="2" fill="url(#py)" filter="url(#gy)">
    <animateTransform attributeName="transform" type="translate" from="-130 0" to="700 0" dur="4.2s" repeatCount="indefinite"/>
  </rect>
</svg>
